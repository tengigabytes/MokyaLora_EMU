name: Deploy MokyaTwin to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'mokya-twin/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false   # Don't need MokyaLora submodule for PWA deploy

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload mokya-twin as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mokya-twin

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

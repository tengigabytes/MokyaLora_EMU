name: Deploy MokyaTwin to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        # with:
        #   enablement: true   # 如果還是失敗，可以取消註解這行試試

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './mokya-twin'   # 你的專案在 mokya-twin 資料夾

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
